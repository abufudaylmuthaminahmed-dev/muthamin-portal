<!DOCTYPE html>
<html lang="dv" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teacher Admin</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @font-face { font-family: 'Faruma'; src: local('Faruma'), url('https://fonts.cdnfonts.com/s/73114/Faruma.woff') format('woff'); }
        * { box-sizing: border-box; font-family: "Faruma", sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f0fdfa; margin: 0; padding: 15px; text-align: right; color: #333; font-size: 16px; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); min-height: 90vh; }
        
        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #e0f2f1; padding-bottom: 10px; }
        .home-btn { font-size: 24px; cursor: pointer; background: none; border: none; }
        h1 { color: #0d9488; margin: 0; font-size: 1.4rem; }
        
        /* DASHBOARD GRID */
        .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; animation: fadeIn 0.4s; }
        .dash-card { 
            background: #fff; border: 1px solid #cbd5e1; border-radius: 16px; padding: 30px 15px; 
            text-align: center; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .dash-card:hover { transform: translateY(-5px); border-color: #0d9488; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        .dash-icon { font-size: 35px; } .dash-title { font-weight: bold; font-size: 16px; color: #1e293b; }
        
        /* STUDENT FLOW CARDS */
        .flow-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .flow-card { background: #f0fdfa; border: 1px solid #99f6e4; border-radius: 10px; padding: 15px; text-align: center; cursor: pointer; color: #0f766e; font-weight: bold; }
        .flow-card:hover { background: #0f766e; color: white; }

        /* STUDENT CARDS */
        .student-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; }
        .student-card { 
            background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; 
            display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s;
        }
        .student-card:hover { border-color: #0d9488; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .st-avatar { width: 40px; height: 40px; background: #ccfbf1; color: #0f766e; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; }

        /* General */
        .section { display: none; animation: fadeIn 0.3s; }
        .btn { padding: 12px; background: #0d9488; color: white; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 5px; }
        .btn-red { background: #ef4444; } .btn-orange { background: #f97316; } .btn-blue { background: #3b82f6; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 6px; width: 100%; text-align: center; margin: 5px 0; outline: none; }
        
        /* Modals */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; backdrop-filter: blur(2px); }
        .modal-content { background:white; margin:5% auto; padding:20px; width:90%; max-width:600px; border-radius: 15px; max-height: 85vh; overflow-y: auto; }

        /* Profile Tabs */
        .detail-tabs { display: flex; gap: 5px; margin-bottom: 15px; background: #f0f9ff; padding: 5px; border-radius: 8px; }
        .tab-btn { flex: 1; padding: 8px; border: none; background: transparent; cursor: pointer; font-weight: bold; color: #555; border-radius: 6px; }
        .tab-btn.active { background: #0d9488; color: white; }
        .detail-section { display: none; }
        .detail-section.active { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
        .detail-item { background: #f8fafc; padding: 8px; border-radius: 6px; border: 1px solid #e2e8f0; text-align: center; }
        .detail-input { width: 100%; padding: 5px; font-size: 13px; height: 30px; border: 1px solid #ccc; }

        @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
    </style>
</head>
<body>

<div id="loginOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0f766e; z-index:5000; display:flex; align-items:center; justify-content:center;">
    <div style="background:white; padding:30px; border-radius:15px; width:300px; text-align:center;">
        <h2 style="color:#0d9488;">Admin Login</h2>
        <input type="password" id="adminPass" placeholder="Password"><button onclick="checkLogin()" class="btn">Login</button>
    </div>
</div>

<div class="container" id="mainContainer" style="display:none;">
    <div class="header">
        <button class="home-btn" onclick="goHome()" title="Home">🏠</button>
        <h1 id="pageTitle" style="border:none; margin:0;">Dashboard</h1>
        <button onclick="logoutAdmin()" style="background:none; border:none; font-size:20px; cursor:pointer;">🔒</button>
    </div>
    
    <!-- DASHBOARD -->
    <div id="dashboardView" class="dash-grid">
        <div class="dash-card" onclick="goToStudents()">
            <div class="dash-icon">👨‍🎓</div>
            <div class="dash-title">Students</div>
        </div>
        <div class="dash-card" onclick="alert('Marks Section under construction for this demo')">
            <div class="dash-icon">📝</div>
            <div class="dash-title">Marks</div>
        </div>
        <div class="dash-card" onclick="alert('Submissions')">
            <div class="dash-icon">🔔</div>
            <div class="dash-title">Submissions</div>
        </div>
        <div class="dash-card" onclick="alert('Notice Board')">
            <div class="dash-icon">📢</div>
            <div class="dash-title">Notice</div>
        </div>
    </div>

    <!-- STUDENT SECTION -->
    <div id="studentOpsView" class="section">
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <div class="dash-card" style="flex:1; padding:15px;" onclick="openStudentModal()">
                <div style="font-size:20px;">➕</div>
                <div class="dash-title">Add Student</div>
            </div>
            <div class="dash-card" style="flex:1; padding:15px;" onclick="openBulkModal()">
                <div style="font-size:20px;">📗</div>
                <div class="dash-title">Excel</div>
            </div>
        </div>

        <h3 style="color:#64748b; margin-bottom:10px;">Select Grade:</h3>
        <div id="gradeGrid" class="flow-grid"></div>

        <div id="classSection" style="display:none; margin-top:20px;">
            <h3 style="color:#64748b; margin-bottom:10px;">Select Class: <span id="selGradeDisplay" style="color:#0d9488"></span></h3>
            <div id="classGrid" class="flow-grid"></div>
        </div>

        <div id="studentListSection" style="display:none; margin-top:20px;">
            <h3 style="color:#64748b; margin-bottom:10px;">Students: <span id="selClassDisplay" style="color:#0d9488"></span></h3>
            <div id="studentGrid" class="student-grid"></div>
        </div>
    </div>

</div>

<!-- PROFILE MODAL -->
<div id="modalProfile" class="modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between;">
            <h3 id="profName" style="margin:0; color:#0d9488;"></h3>
            <button onclick="closeModal('modalProfile')" style="background:none; border:none; font-size:20px;">&times;</button>
        </div>
        <p id="profInfo" style="color:#666; font-size:13px; margin-bottom:15px;"></p>
        
        <button class="btn btn-orange" style="width:auto; padding:5px 15px; font-size:12px; margin-bottom:15px;" onclick="openEditModal()">✏️ Edit Info</button>

        <div class="detail-tabs">
            <button class="tab-btn active" onclick="switchDetailTab('weekly')">Weekly</button>
            <button class="tab-btn" onclick="switchDetailTab('tests')">Tests</button>
            <button class="tab-btn" onclick="switchDetailTab('ca')">CA</button>
        </div>

        <input type="hidden" id="profId">
        <div id="detail-tab-weekly" class="detail-section active"></div>
        <div id="detail-tab-tests" class="detail-section"></div>
        <div id="detail-tab-ca" class="detail-section"></div>

        <div style="margin-top:20px;">
            <button class="btn" onclick="saveHistory()">💾 Save Changes</button>
        </div>
    </div>
</div>

<!-- EDIT INFO MODAL -->
<div id="modalEdit" class="modal" style="z-index:1100;">
    <div class="modal-content" style="max-width:350px;">
        <h3>Edit Info</h3>
        <input id="editIdx" placeholder="Index">
        <input id="editNam" placeholder="Name">
        <div style="display:flex;gap:5px"><input id="editGrd" placeholder="Grade"><input id="editCls" placeholder="Class"></div>
        <input id="editPwd" placeholder="Password">
        <button class="btn" onclick="saveEdit()">Update</button>
        <button class="btn btn-red" onclick="delStudent()">Delete</button>
        <button class="btn" style="background:#ccc;color:#333;margin-top:5px" onclick="closeModal('modalEdit')">Close</button>
    </div>
</div>

<!-- Add/Bulk Modals (Hidden for brevity, same as before) -->
<div id="modalAdd" class="modal"><div class="modal-content"><h3>Add</h3><input id="newIdx" placeholder="Index"><input id="newNam" placeholder="Name"><div style="display:flex;gap:5px"><input id="newGrd" placeholder="Grade"><input id="newCls" placeholder="Class"></div><input id="newPwd" value="1234"><button class="btn" onclick="addSingleStudent()">Save</button><button class="btn btn-red" onclick="closeModal('modalAdd')">Cancel</button></div></div>
<div id="modalBulk" class="modal"><div class="modal-content"><h3>Excel</h3><input type="file" id="excelFile"><button class="btn" onclick="processBulk()">Upload</button><button class="btn btn-red" onclick="closeModal('modalBulk')">Cancel</button></div></div>
<div id="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, setDoc, updateDoc, deleteDoc, deleteField } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDSEHqUQIegVjhWKpRgpJybdPaVDVroVos",
  authDomain: "islam-portal-muthamin.firebaseapp.com",
  projectId: "islam-portal-muthamin",
  storageBucket: "islam-portal-muthamin.firebasestorage.app",
  messagingSenderId: "842342714257",
  appId: "1:842342714257:web:c5daa61eee6524e7936830" };
    const app = initializeApp(firebaseConfig); const db = getFirestore(app);
    let students = []; let selectedGrade = null;

    // Login
    window.checkLogin = () => { if(document.getElementById('adminPass').value === "123") { document.getElementById('loginOverlay').style.display='none'; document.getElementById('mainContainer').style.display='block'; fetchData(); } else alert("Wrong"); };
    async function fetchData() { const s = await getDocs(collection(db, "students")); students = []; s.forEach(d => students.push({ id: d.id, ...d.data() })); }

    // Navigation
    window.goHome = () => {
        document.querySelectorAll('.section').forEach(s => s.style.display='none');
        document.getElementById('dashboardView').style.display='grid';
        document.getElementById('pageTitle').innerText = "Dashboard";
    };

    window.goToStudents = () => {
        document.getElementById('dashboardView').style.display='none';
        document.getElementById('studentOpsView').style.display='block';
        document.getElementById('pageTitle').innerText = "Students";
        renderGrades();
    };

    // --- STUDENT FLOW ---
    function renderGrades() {
        const grades = [...new Set(students.map(s => s.grade))].filter(Boolean).sort();
        document.getElementById('gradeGrid').innerHTML = grades.map(g => `<div class="flow-card" onclick="selectGrade('${g}')">${g}</div>`).join('');
        document.getElementById('classSection').style.display='none';
        document.getElementById('studentListSection').style.display='none';
    }

    window.selectGrade = (g) => {
        selectedGrade = g;
        document.getElementById('selGradeDisplay').innerText = g;
        const classes = [...new Set(students.filter(s => s.grade == g).map(s => s.class))].filter(Boolean).sort();
        document.getElementById('classGrid').innerHTML = classes.map(c => `<div class="flow-card" onclick="selectClass('${c}')">${c}</div>`).join('');
        document.getElementById('classSection').style.display='block';
        document.getElementById('studentListSection').style.display='none';
    };

    window.selectClass = (c) => {
        document.getElementById('selClassDisplay').innerText = `${selectedGrade} - ${c}`;
        const list = students.filter(s => s.grade == selectedGrade && s.class == c).sort((a,b) => a.index - b.index);
        document.getElementById('studentGrid').innerHTML = list.map(s => `
            <div class="student-card" onclick="openProfile('${s.id}')">
                <div class="st-avatar">${s.name.charAt(0)}</div>
                <div class="st-info"><div>${s.name}</div><div>Index: ${s.index}</div></div>
            </div>`).join('');
        document.getElementById('studentListSection').style.display='block';
    };

    // --- PROFILE ---
    window.openProfile = (id) => {
        let s = students.find(x => x.id === id);
        document.getElementById('profName').innerText = s.name;
        document.getElementById('profInfo').innerText = `Index: ${s.index} | Grade: ${s.grade} | Class: ${s.class}`;
        document.getElementById('profId').value = s.id;
        
        // Fill Edit Modal Inputs
        document.getElementById('editIdx').value = s.index; document.getElementById('editNam').value = s.name;
        document.getElementById('editGrd').value = s.grade; document.getElementById('editCls').value = s.class;
        document.getElementById('editPwd').value = s.password || "1234";

        // Generate History Inputs
        let wHtml=''; for(let i=1;i<=45;i++){ let v=s['Week'+i]||''; wHtml+=`<div class="detail-item"><span class="detail-label">W${i}</span><select class="detail-input" id="h_Week${i}"><option value="">-</option><option value="ނިމިފައި" ${v=='ނިމިފައި'?'selected':''}>✓</option><option value="ނުނިމޭ" ${v=='ނުނިމޭ'?'selected':''}>X</option></select></div>`; }
        document.getElementById('detail-tab-weekly').innerHTML = wHtml;

        let tHtml=''; for(let i=1;i<=10;i++){ let v=s['UnitTest'+i]||''; tHtml+=`<div class="detail-item"><span class="detail-label">UT${i}</span><input type="number" class="detail-input" id="h_UnitTest${i}" value="${v}"></div>`; }
        document.getElementById('detail-tab-tests').innerHTML = tHtml;

        let cHtml=''; for(let i=1;i<=4;i++){ let v=s['CA'+i]||''; cHtml+=`<div class="detail-item"><span class="detail-label">CA${i}</span><input type="number" class="detail-input" id="h_CA${i}" value="${v}"></div>`; }
        document.getElementById('detail-tab-ca').innerHTML = cHtml;

        window.switchDetailTab('weekly');
        document.getElementById('modalProfile').style.display='block';
    };

    window.switchDetailTab = (t) => {
        document.querySelectorAll('.detail-section').forEach(s => s.style.display='none');
        document.getElementById(`detail-tab-${t}`).style.display='grid';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    };

    window.saveHistory = async () => {
        let id = document.getElementById('profId').value;
        let updates = {};
        for(let i=1;i<=45;i++){ let el=document.getElementById(`h_Week${i}`); if(el) updates[`Week${i}`]=el.value||""; }
        for(let i=1;i<=10;i++){ let el=document.getElementById(`h_UnitTest${i}`); if(el) updates[`UnitTest${i}`]=el.value||""; }
        for(let i=1;i<=4;i++){ let el=document.getElementById(`h_CA${i}`); if(el) updates[`CA${i}`]=el.value||""; }
        
        await updateDoc(doc(db, "students", id), updates);
        alert("History Saved!");
        fetchData();
        closeModal('modalProfile');
    };

    window.openEditModal = () => document.getElementById('modalEdit').style.display='block';
    window.saveEdit = async () => {
        let id = document.getElementById('profId').value;
        await updateDoc(doc(db, "students", id), {
            index: document.getElementById('editIdx').value, name: document.getElementById('editNam').value,
            grade: document.getElementById('editGrd').value, class: document.getElementById('editCls').value,
            password: document.getElementById('editPwd').value
        });
        alert("Updated!"); closeModal('modalEdit'); closeModal('modalProfile'); fetchData();
    };

    window.delStudent = async () => {
        if(confirm("Delete?")) { await deleteDoc(doc(db, "students", document.getElementById('profId').value)); closeModal('modalEdit'); closeModal('modalProfile'); fetchData(); }
    };

    // Utils
    window.openStudentModal=()=>document.getElementById('modalAdd').style.display='block';
    window.openBulkModal=()=>document.getElementById('modalBulk').style.display='block';
    window.closeModal=(i)=>document.getElementById(i).style.display='none';
    window.addSingleStudent=async()=>{
        let idx=document.getElementById('newIdx').value;
        if(students.some(s=>s.index==idx)) return alert("Exists");
        await setDoc(doc(collection(db,"students")),{
            index:idx, name:document.getElementById('newNam').value, grade:document.getElementById('newGrd').value,
            class:document.getElementById('newCls').value, password:"1234"
        });
        closeModal('modalAdd'); fetchData();
    };
    
    // Excel
    document.getElementById('excelFile').addEventListener('change',e=>{const r=new FileReader();r.onload=e=>{window.parsedExcel=XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(e.target.result),{type:'array'}).Sheets[XLSX.read(new Uint8Array(e.target.result),{type:'array'}).SheetNames[0]],{header:1});};r.readAsArrayBuffer(e.target.files[0]);});
    window.processBulk=async()=>{if(!window.parsedExcel)return; for(let r of window.parsedExcel){if(r.length>=2&&r[0]!='Index'&&!students.some(s=>s.index==r[0])) await setDoc(doc(collection(db,"students")),{index:String(r[0]),name:r[1],grade:String(r[2]||''),class:String(r[3]||''),password:"1234"});} closeModal('modalBulk'); fetchData(); alert("Uploaded");};

</script>
</body>
</html>
